name: Keep schedule alive

# GitHub automatically disables scheduled workflows after 60 days with no
# repository activity (commits). This job runs weekly and, only if the repo has
# been idle for 45+ days, pushes a single empty commit — which counts as activity
# and resets the timer, keeping the daily digest schedule running indefinitely.
# A push from the built-in GITHUB_TOKEN does NOT trigger other workflows, so this
# never fires the digest itself. If you commit manually now and then, it no-ops.

on:
  schedule:
    - cron: "0 12 * * 1"   # 12:00 UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Empty commit if repo has gone stale
        run: |
          LAST=$(git log -1 --format=%ct)
          DAYS=$(( ( $(date +%s) - LAST ) / 86400 ))
          echo "Days since last commit: $DAYS"
          if [ "$DAYS" -ge 45 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive (prevent scheduled-workflow auto-disable)"
            git push
            echo "Pushed keepalive commit."
          else
            echo "Recent activity — no keepalive needed."
          fi
